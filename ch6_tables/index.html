<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tables</title>
  </head>
  <body>
    <h1>The exam results</h1>
    <table border="1">
      <thead>
        <tr>
          <th>name</th>
          <th>subject</th>
          <th>marks</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>John</td>
          <td>Math</td>
          <td>85</td>
        </tr>

        <tr>
          <td>Jane</td>
          <td>Science</td>
          <td>90</td>
        </tr>

        <tr>
          <td>Mike</td>
          <td>History</td>
          <td>78</td>
        </tr>
      </tbody>
      <tfoot>
        <tr>
          <th>Name</th>
          <th>subject</th>
          <th>marks</th>
        </tr>
      </tfoot>
    </table>
  </body>
</html>
