<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>div img ol ul li</title>
  </head>
  <body>
    <h1>HTML elements div,img,ol,ul,li</h1>
    <div style="border: 1px solid black">
      <img src="man.png" alt="" height="300px" />
      <p>This man is famous</p>
    </div>
    <h2>His brothers</h2>
    <ul>
      <li>Ali</li>
      <li>Muhammad</li>
      <li>Ibrahim</li>
    </ul>
    <h2>His hobbies</h2>
    <ol type="1" reversed>
      <li>Reading</li>
      <li>swimming</li>
      <li>travelling</li>
      <li>coding</li>
    </ol>
  </body>
</html>
